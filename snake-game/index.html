<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags for proper encoding and responsive layout -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Classic Snake Game</title>

  <!-- Main stylesheet for UI and board styling -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Container for the full game UI -->
  <div class="container">
    <!-- Header with title and score display -->
    <header>
      <h1>Classic Snake</h1>
      <div class="info">
        <span>Score: <span id="score">0</span></span>
        <span>High Score: <span id="highScore">0</span></span>
        <span class="timer hidden">Time: <span id="timer">0</span>s</span>
      </div>
    </header>

    <!-- Rendered snake + food cells go inside this board -->
    <div class="game-board" id="gameBoard"></div>

    <!-- Gameplay settings -->
    <div class="settings">
      <div class="setting">
        <label for="modeSelect">Mode</label>
        <select id="modeSelect">
          <option value="classic" selected>Classic</option>
          <option value="timed">Timed</option>
          <option value="survival">Survival</option>
          <option value="challenge">Challenge</option>
          <option value="autopilot">Auto Play</option>
        </select>
      </div>

      <div class="setting">
        <label for="boardSizeSelect">Board size</label>
        <select id="boardSizeSelect">
          <option value="16">16×16</option>
          <option value="20" selected>20×20</option>
          <option value="24">24×24</option>
          <option value="30">30×30</option>
        </select>
      </div>

      <div class="setting">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="default" selected>Default</option>
          <option value="neon">Neon</option>
          <option value="retro">Retro</option>
        </select>
      </div>

      <div class="setting">
        <label class="checkbox">
          <input type="checkbox" id="soundToggle" checked />
          Sound
        </label>
      </div>
    </div>

    <!-- Controls section: instructions + restart button -->
    <div class="controls">
      <p>Use arrow keys or WASD to move.</p>
      <button id="restartBtn">Restart</button>
    </div>

    <!-- Leaderboard (top scores) -->
    <div class="leaderboard" id="leaderboard">
      <h2>Top Scores</h2>
      <ol id="leaderboardList"></ol>
    </div>

    <!-- Overlay shown when the game ends -->
    <div class="overlay hidden" id="gameOver">
      <div class="overlay__content">
        <h2>Game Over</h2>
        <p>Your score: <span id="finalScore">0</span></p>
        <button id="playAgainBtn">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Game logic and rendering code -->
  <script src="script.js"></script>
</body>
</html>
